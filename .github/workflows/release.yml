name: Release package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install QA tools
        run: python -m pip install --upgrade ruff

      - name: Lint
        run: ruff check .

      - name: Compile
        run: python -m compileall -q src tests

      - name: Validate manifest
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path

          manifest = json.loads(Path("src/plugins/plg_sitemap/manifest.json").read_text())
          tag = os.environ.get("GITHUB_REF_NAME", "")
          expected = tag[1:] if tag.startswith("v") else manifest["version"]
          if manifest["version"] != expected:
              raise SystemExit(f"manifest.version {manifest['version']} does not match tag {tag}")
          required = {
              "schema_version", "name", "type", "vendor", "extension_id",
              "display_name", "description", "version", "license",
              "compatibility", "package",
          }
          missing = sorted(required - manifest.keys())
          if missing:
              raise SystemExit(f"manifest.json missing required keys: {', '.join(missing)}")
          if manifest["extension_id"] != f"{manifest['vendor']}/{manifest['name']}":
              raise SystemExit("extension_id must be vendor/name")
          PY

      - name: Build ZIP package
        run: |
          python - <<'PY'
          import json, zipfile
          from pathlib import Path

          root = Path("src/plugins/plg_sitemap")
          manifest = json.loads((root / "manifest.json").read_text())
          package_name = f"{manifest['name']}-{manifest['version']}"
          out = Path(f"{package_name}.zip")
          with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
              for path in sorted(root.rglob("*")):
                  rel = path.relative_to(root)
                  if "__pycache__" in rel.parts or path.suffix in {".pyc", ".pyo"}:
                      continue
                  if path.is_file():
                      zf.write(path, Path(package_name) / rel)
          print(out)
          PY

      - name: Generate checksum
        run: sha256sum plg_sitemap-*.zip > SHA256SUMS

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            plg_sitemap-*.zip
            SHA256SUMS
